parameters:
  - name: method
    values:
      - POST
      - GET
  - name: url
  - name: headers
    default: ""
  - name: body
    default: ""
  - name: display_name
    default: ""

steps:
  - bash: |
      curl --fail -X "$method" -H "$headers" -d "$body" "$url"
    env:
      method: ${{ parameters.method }}
      url: ${{ parameters.url }}
      headers: ${{ parameters.headers }}
      body: ${{ parameters.body }}
    displayName: ${{ coalesce(parameters.display_name, 'curl') }}
