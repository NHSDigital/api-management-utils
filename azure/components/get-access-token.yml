parameters:
  - name: apigee_username
    type: string
  - name: apigee_password
    type: string
  - name: apigee_organization
    type: string
    default: nonprod
  - name: _auth_server
    type: object
    default:
      nonprod: login.apigee.com
      prod: nhs-digital-prod.login.apigee.com

steps:
  - bash: |
      set -euo pipefail
      echo "apigee_username: $apigee_username"
      echo "apigee_organization: $apigee_organization"
      echo "auth_url: $auth_url"
    env:
      apigee_username: ${{ parameters.apigee_username }}
      apigee_organization: ${{ parameters.apigee_organization }}
      auth_url: ${{ parameters._auth_server[parameters.apigee_organization] }}
    displayName: "Print access token debug info"

  - bash: |
      set -euo pipefail

      # fetch the access token
      curl -X POST https://$auth_url/oauth/token \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -H "Accept: application/json;charset=utf-8" \
        -H "Authorization: Basic ZWRnZWNsaTplZGdlY2xpc2VjcmV0" \
        -d "username=$apigee_username&password=$apigee_password&mfa_token=$(secret.MFACode)&grant_type=password" | jq -e .access_token > .token

      # Set token into variable
      echo "##vso[task.setvariable variable=secret.AccessToken;issecret=true]`cat .token`"
    env:
      apigee_username: ${{ parameters.apigee_username }}
      apigee_password: ${{ parameters.apigee_password }}
      auth_url: ${{ parameters._auth_server[parameters.apigee_organization] }}
    displayName: "Get Apigee Access Token"
    retryCountOnTaskFailure: 5
