parameters:
  - name: "out_dir"
    type: string
    default: "./"
  - name: "source_root"
    type: string
    default: "./"
  - name: "service_name"
    type: string
    default: ""
  - name: "service_id"
    type: string
    default: ""
  - name: "utils_dir"
    type: string
    default: "utils"
steps:
  - bash: |
      export out_dir="$(realpath $out_dir)"
      export commit_hash="$(git -C $source_root rev-parse --short HEAD)"
      # sha prefix is required docker gets upset if names contain -0 iirc
      export build_label="$(Build.BuildId)-sha${commit_hash}"
      export pr_number="$(System.PullRequest.PullRequestNumber)"
      export service_name="$service_name"
      export service_id="$service_id"
      export ANSIBLE_FORCE_COLOR=yes
      make --no-print-directory -C $utils_dir/ansible create-build-env-vars
    env:
      out_dir: ${{ parameters.out_dir }}
      source_root: ${{ parameters.source_root }}
      service_name: ${{ parameters.service_name }}
      service_id: ${{ parameters.service_id }}
      utils_dir: ${{ parameters.utils_dir }}
    displayName: output build env vars for artifact
