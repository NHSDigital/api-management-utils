- name: set image_name fact
  set_fact:
    image_name: "{{ ecr_registry }}/{{ service_id }}_{{ item }}:{{ build_label }}"

- name: find most recent tag
  command: >
    {{ aws_cmd }} ecr describe-images --repository-name {{ service_id }}_{{ item }} --filter tagStatus=TAGGED --no-paginate
    --query 'imageDetails[0].imageTags[0]' --output text
  register: describe_images
  changed_when: no

- name: pull latest if exists - to ensure cache  {{ item }}
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/{{ service_id }}_{{ item }}:{{ describe_images.stdout }}"
  when: describe_images.stdout != 'None'
  ignore_errors: true
  no_log: true

- name: build ecr image {{ item }}
  ansible.builtin.command:
    cmd: >
      docker build
      -t {{ image_name }}
      -f {{ base_dir }}/{{ images_map[item].dockerfile }}
      {{ base_dir }}/{{ images_map[item].path }}
      --network host --pull
  register: build_result
  ignore_errors: false

- name: push ecr image {{ item }}
  ansible.builtin.command:
    cmd: "docker push {{ image_name }}"
  when: build_result.rc == 0

- name: Check if lifecycle policy exists for {{ service_id }}_{{ item }}
  ansible.builtin.command: >
    {{ aws_cmd }} ecr get-lifecycle-policy
    --repository-name {{ service_id }}_{{ item }}
  register: lifecycle_check
  failed_when: false
  changed_when: false

- debug: 
    msg:
      - "ROLE PATH = {{ role_path }}" 
      - "BASE DIR = {{ base_dir }}" 
      - "PWD = {{ lookup('env','PWD') }}"

- name: List contents of the role directory
  ansible.builtin.command: "ls -R {{ role_path }}"
  register: ls_role
  changed_when: false
  failed_when: false

- debug:
    var: ls_role.stdout_lines

- name: Apply lifecycle policy to ecr {{ service_id }}_{{ item }}
  ansible.builtin.command:
    cmd: >
      {{ aws_cmd }} ecr put-lifecycle-policy
      --repository-name {{ service_id }}_{{ item }}
      --lifecycle-policy-text file://{{ role_path }}/files/ecr_lifecycle.json
  when: lifecycle_check.rc != 0 and build_result.rc == 0
